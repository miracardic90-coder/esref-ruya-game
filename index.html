<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Eşref Rüya</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{background:#000;display:flex;align-items:center;justify-content:center;
      width:100%;height:100%;min-height:100vh;overflow:hidden;touch-action:none;
      font-family:'Courier New',monospace;color:#fff;}
    #wrap{position:relative;flex-shrink:0;}
    canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

    /* HUD */
    #hud{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:4;
      background:linear-gradient(rgba(0,0,0,.8),transparent);padding:5px 8px 12px;}
    #hudTop{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;}
    .pcard{background:rgba(0,0,0,.5);border:1px solid #333;padding:4px 6px;border-radius:3px;min-width:80px;}
    .pcard.esref-card{border-color:#c8a84b88;}
    .pcard.dead{opacity:.4;}
    .pcard-name{font-size:9px;color:#aaa;margin-bottom:2px;}
    .pcard-name.me{color:#c8a84b;}
    .pcard-name.esref{color:#ffd700;}
    .pcard-bar{height:5px;background:#222;border-radius:2px;overflow:hidden;}
    .pcard-fill{height:100%;border-radius:2px;transition:width .1s;}
    .fill-esref{background:linear-gradient(90deg,#c8a84b,#ffe080);}
    .fill-nisan{background:linear-gradient(90deg,#c06080,#ff88aa);}
    .fill-gurdalı{background:linear-gradient(90deg,#2060c0,#60a0ff);}
    .fill-muslum{background:linear-gradient(90deg,#208040,#60d080);}
    .fill-faruk{background:linear-gradient(90deg,#806020,#d0a040);}
    #hudMid{text-align:center;margin-top:3px;}
    #hudMid span{font-size:10px;color:#c8a84b;margin:0 6px;}
    #ammoWrap{display:flex;align-items:center;gap:4px;margin-top:3px;}
    #ammoLabel{font-size:9px;color:#c8a84b;}
    #ammoBar{flex:1;height:4px;background:#222;border-radius:2px;overflow:hidden;}
    #ammoFill{height:100%;background:linear-gradient(90deg,#c8a84b,#ffe080);transition:width .1s;}
    #roleTag{position:absolute;top:0;right:0;padding:4px 8px;font-size:10px;
      background:rgba(0,0,0,.7);border-bottom-left-radius:4px;border:1px solid #333;
      border-top:none;border-right:none;}

    /* OVERLAY */
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:rgba(0,0,0,.92);z-index:10;}
    #overlay h1{font-size:clamp(20px,5vw,32px);color:#c8a84b;
      text-shadow:0 0 24px #c8a84b99;letter-spacing:5px;margin-bottom:4px;}
    .sub{font-size:11px;color:#555;letter-spacing:3px;margin-bottom:20px;}
    .lobby{background:#0a0a14;border:1px solid #c8a84b33;padding:22px 28px;
      display:flex;flex-direction:column;gap:10px;min-width:280px;max-width:340px;}
    .lobby label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;}
    .lobby input{background:#0d0d1a;border:1px solid #2a2a3a;color:#fff;
      padding:8px 10px;font-family:'Courier New',monospace;font-size:13px;width:100%;
      border-radius:2px;}
    .lobby input:focus{outline:none;border-color:#c8a84b;}
    .btn-gold{padding:11px;background:#c8a84b;color:#000;border:none;
      font-family:'Courier New',monospace;font-size:13px;font-weight:bold;
      cursor:pointer;letter-spacing:2px;border-radius:2px;width:100%;}
    .btn-gold:active{background:#e0c060;}
    .btn-start{padding:11px;background:#1c2340;color:#c8a84b;border:1px solid #c8a84b55;
      font-family:'Courier New',monospace;font-size:13px;font-weight:bold;
      cursor:pointer;letter-spacing:2px;border-radius:2px;width:100%;display:none;}
    .btn-start:active{background:#2a3460;}
    #lobbyPlayers{display:flex;gap:6px;flex-wrap:wrap;}
    .lp-slot{width:56px;height:56px;background:#111;border:1px solid #222;
      border-radius:4px;display:flex;flex-direction:column;align-items:center;
      justify-content:center;font-size:9px;color:#444;gap:2px;}
    .lp-slot.filled{border-color:#c8a84b44;color:#888;}
    .lp-slot .lp-icon{font-size:20px;}
    #lobbyCode{font-size:20px;color:#fff;text-align:center;letter-spacing:5px;
      background:#111;border:1px solid #c8a84b33;padding:8px;border-radius:2px;display:none;}
    #lobbyStatus{font-size:11px;color:#666;text-align:center;min-height:14px;}
    #roleReveal{display:none;flex-direction:column;align-items:center;gap:10px;padding:20px;}
    #roleReveal .role-big{font-size:48px;}
    #roleReveal .role-name{font-size:22px;color:#c8a84b;letter-spacing:3px;}
    #roleReveal .role-desc{font-size:12px;color:#888;text-align:center;max-width:260px;line-height:1.7;}
    #roleReveal .role-btn{margin-top:8px;}

    /* DİYALOG */
    #dlg{position:absolute;bottom:80px;left:8px;right:8px;
      background:rgba(0,0,0,.93);border:1px solid #c8a84b;
      padding:9px 13px;font-size:11px;color:#fff;
      pointer-events:none;display:none;z-index:5;border-radius:3px;}
    #dlgSpeaker{color:#c8a84b;font-weight:bold;font-size:12px;margin-bottom:3px;}

    /* MOBİL */
    #mobileCtrl{position:absolute;bottom:0;left:0;right:0;height:76px;display:none;z-index:6;}
    #jzone{position:absolute;bottom:8px;left:10px;display:grid;
      grid-template-columns:repeat(3,38px);grid-template-rows:repeat(2,38px);gap:3px;pointer-events:all;}
    .jbtn{width:38px;height:38px;background:rgba(200,168,75,.12);
      border:1.5px solid rgba(200,168,75,.35);border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;color:rgba(200,168,75,.8);user-select:none;}
    .jbtn.pressed,.jbtn:active{background:rgba(200,168,75,.38);border-color:#c8a84b;}
    #azone{position:absolute;bottom:8px;right:10px;display:flex;gap:7px;align-items:flex-end;pointer-events:all;}
    .abtn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:10px;font-weight:bold;
      font-family:'Courier New',monospace;user-select:none;border:2px solid;}
    .abtn:active,.abtn.pressed{filter:brightness(1.6);}
    #btnShoot{background:rgba(200,40,40,.28);border-color:#ff4444;color:#ff8888;}
    #btnDash{background:rgba(40,120,200,.28);border-color:#4488ff;color:#88aaff;}
    #btnReload{background:rgba(200,168,75,.18);border-color:#c8a84b;color:#c8a84b;font-size:9px;}
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hudTop"></div>
    <div id="hudMid">
      <span id="hudRoom">—</span>
      <span id="hudWave">DALGA 1/3</span>
      <span id="hudScore">★ 0</span>
    </div>
    <div id="ammoWrap">
      <span id="ammoLabel">🔫 12/12</span>
      <div id="ammoBar"><div id="ammoFill"></div></div>
    </div>
  </div>
  <div id="roleTag"></div>

  <!-- LOBBY -->
  <div id="overlay">
    <h1>EŞREF RÜYA</h1>
    <div class="sub">4 OYUNCULU • KANAL D 2025</div>

    <div class="lobby" id="lobbyPanel">
      <label>Oda Kodu</label>
      <input id="roomInput" placeholder="RAVENA" maxlength="10" value="RAVENA"/>
      <button class="btn-gold" onclick="joinRoom()">ODAYA GİR</button>
      <div id="lobbyCode"></div>
      <label style="margin-top:4px">Oyuncular (max 4)</label>
      <div id="lobbyPlayers">
        <div class="lp-slot" id="slot0"><span class="lp-icon">👤</span><span>Boş</span></div>
        <div class="lp-slot" id="slot1"><span class="lp-icon">👤</span><span>Boş</span></div>
        <div class="lp-slot" id="slot2"><span class="lp-icon">👤</span><span>Boş</span></div>
        <div class="lp-slot" id="slot3"><span class="lp-icon">👤</span><span>Boş</span></div>
      </div>
      <button class="btn-start" id="btnStart" onclick="startGame()">OYUNU BAŞLAT</button>
      <div id="lobbyStatus">Oda kodunu gir ve katıl</div>
    </div>

    <!-- Rol açıklama ekranı -->
    <div id="roleReveal">
      <div class="role-big" id="revealIcon">🎭</div>
      <div class="role-name" id="revealName">—</div>
      <div class="role-desc" id="revealDesc">—</div>
      <button class="btn-gold role-btn" onclick="dismissRole()">HAZIR</button>
    </div>
  </div>

  <div id="dlg"><div id="dlgSpeaker"></div><div id="dlgText"></div></div>

  <div id="mobileCtrl">
    <div id="jzone">
      <div></div><div class="jbtn" id="jUp">▲</div><div></div>
      <div class="jbtn" id="jLeft">◀</div>
      <div class="jbtn" id="jDown">▼</div>
      <div class="jbtn" id="jRight">▶</div>
    </div>
    <div id="azone">
      <div class="abtn" id="btnReload">YENİLE</div>
      <div class="abtn" id="btnDash">KAÇIN</div>
      <div class="abtn" id="btnShoot">ATEŞ</div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
<script src="mobile.js"></script>
</body>
</html>
